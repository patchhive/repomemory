version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8030:8000"
    volumes:
      - ./data:/data
    environment:
      - REPO_MEMORY_DB_PATH=/data/repo-memory.db
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5176:80"
    depends_on:
      - backend
    restart: unless-stopped
