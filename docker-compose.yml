services:
  backend:
    image: "${PATCHHIVE_REPO_MEMORY_BACKEND_IMAGE:-ghcr.io/patchhive/repomemory-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8030:8000"
    volumes:
      - ./data:/data
    environment:
      - REPO_MEMORY_DB_PATH=/data/repo-memory.db
      - REPO_MEMORY_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_REPO_MEMORY_FRONTEND_IMAGE:-ghcr.io/patchhive/repomemory-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5176:8080"
    depends_on:
      - backend
    restart: unless-stopped
